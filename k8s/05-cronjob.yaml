apiVersion: batch/v1
kind: CronJob
metadata:
  name: healer-poller
  namespace: k8s-healer
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: healer-sa
          restartPolicy: Never
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
          containers:
          - name: poller
            image: us-central1-docker.pkg.dev/openclaw-k8s-healer/healer/healer:latest
            imagePullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                export ANTHROPIC_API_KEY="$(cat /mnt/secrets-store/anthropic-api-key)"
                export SLACK_BOT_TOKEN="$(cat /mnt/secrets-store/slack-bot-token)"
                exec python /app/poller.py
            env:
            - name: CONFIG_PATH
              value: /etc/healer/config.yaml
            - name: AUDIT_DB_PATH
              value: /data/audit.db
            - name: WATCH_NAMESPACES
              value: "default"
            - name: MAX_EVENTS_PER_RUN
              value: "5"
            volumeMounts:
            - name: config
              mountPath: /etc/healer
            - name: audit
              mountPath: /data
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
          volumes:
          - name: config
            configMap:
              name: healer-config
          - name: audit
            persistentVolumeClaim:
              claimName: healer-audit
          - name: secrets-store
            csi:
              driver: secrets-store-gke.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: "healer-secrets"
