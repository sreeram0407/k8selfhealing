apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: healer-secrets
  namespace: k8s-healer
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/openclaw-k8s-healer/secrets/anthropic-api-key/versions/latest"
        path: "anthropic-api-key"
      - resourceName: "projects/openclaw-k8s-healer/secrets/slack-bot-token/versions/latest"
        path: "slack-bot-token"
