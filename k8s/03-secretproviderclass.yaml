apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: healer-secrets
  namespace: k8s-healer
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/openclaw-k8s-healer/secrets/anthropic-api-key/versions/latest"
        path: "anthropic-api-key"
      - resourceName: "projects/openclaw-k8s-healer/secrets/slack-bot-token/versions/latest"
        path: "slack-bot-token"
  # Sync into a real K8s Secret so we can use `secretKeyRef` in env vars.
  # The CSI volume must be mounted in the pod for the sync to activate.
  secretObjects:
  - secretName: healer-secrets
    type: Opaque
    data:
    - objectName: anthropic-api-key
      key: ANTHROPIC_API_KEY
    - objectName: slack-bot-token
      key: SLACK_BOT_TOKEN
