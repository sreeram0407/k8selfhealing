# Allow the CSI secrets-store driver to create/update the synced K8s Secret
# on behalf of healer-sa. Namespace-scoped — no cluster admin needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: healer-secret-sync
  namespace: k8s-healer
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healer-secret-sync
  namespace: k8s-healer
subjects:
- kind: ServiceAccount
  name: healer-sa
  namespace: k8s-healer
roleRef:
  kind: Role
  name: healer-secret-sync
  apiGroup: rbac.authorization.k8s.io
